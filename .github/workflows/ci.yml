name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Compile, lint, format and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile
        run: npm run compile

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Run tests with coverage
        run: node --test --experimental-test-coverage out/test/**/*.test.js

      - name: Audit System Library
        run: node scripts/audit-system-library.js

      - name: Generate docs (sanity-check)
        run: node scripts/generate-system-library-docs.js
