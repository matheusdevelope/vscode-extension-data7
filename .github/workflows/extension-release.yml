name: Extension Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Install Dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Compile and Test
        run: npm run test

      - name: Package VS Code Extension
        run: |
          npx @vscode/vsce package -o vscode-extension-data7.vsix
